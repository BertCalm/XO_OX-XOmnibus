<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XOceanus UI Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #16181e;
    color: #c8ccd8;
    font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ── OCEAN BACKGROUND ────────────────────── */
  .ocean {
    flex: 1;
    position: relative;
    background: radial-gradient(ellipse at 50% 55%, #1a2438 0%, #16181e 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .ocean::before {
    content: '';
    position: absolute;
    width: 800px; height: 800px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid rgba(60, 180, 170, 0.06);
    box-shadow:
      0 0 0 120px transparent, 0 0 0 121px rgba(60, 180, 170, 0.04),
      0 0 0 240px transparent, 0 0 0 241px rgba(60, 180, 170, 0.03),
      0 0 0 360px transparent, 0 0 0 361px rgba(60, 180, 170, 0.02);
    pointer-events: none;
  }

  /* ── ENGINE SLOTS (orbital) ──────────────── */
  .slot-ring {
    position: absolute;
    width: 280px; height: 280px;
    top: calc(50% - 20px); left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: width 0.3s, height 0.3s, top 0.3s;
  }
  .ocean-split:has(.surface-right.open) .slot-ring {
    width: 240px; height: 240px;
    top: calc(50% - 30px);
  }

  .engine-slot {
    position: absolute;
    width: 56px; height: 56px;
    border-radius: 16px;
    border: 2px dashed rgba(60, 180, 170, 0.15);
    background: rgba(60, 180, 170, 0.03);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.2s;
    pointer-events: all;
  }
  .engine-slot:hover {
    border-color: rgba(60, 180, 170, 0.4);
    background: rgba(60, 180, 170, 0.08);
    transform: scale(1.08);
  }
  .engine-slot.empty { opacity: 0.5; }
  .engine-slot.empty:hover { opacity: 1; }
  .engine-slot.empty::after {
    content: '+';
    font-size: 20px;
    color: rgba(60, 180, 170, 0.4);
    font-weight: 300;
  }
  .engine-slot.loaded {
    border-style: solid;
    border-color: rgba(60, 180, 170, 0.3);
    background: rgba(60, 180, 170, 0.06);
    opacity: 1;
  }
  .engine-slot.loaded:hover {
    border-color: rgba(60, 180, 170, 0.6);
    box-shadow: 0 0 20px rgba(60, 180, 170, 0.15);
  }
  .engine-slot.active {
    border-color: rgba(60, 180, 170, 0.6);
    background: rgba(60, 180, 170, 0.1);
    box-shadow: 0 0 24px rgba(60, 180, 170, 0.2);
  }

  .slot-label {
    position: absolute;
    bottom: -18px;
    left: 50%; transform: translateX(-50%);
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(200, 204, 216, 0.3);
    white-space: nowrap;
  }
  .engine-slot.loaded .slot-label { color: rgba(60, 180, 170, 0.6); }

  /* Position slots around the ring */
  .engine-slot:nth-child(1) { top: -28px; left: 50%; transform: translateX(-50%); }
  .engine-slot:nth-child(2) { top: 50%; right: -28px; transform: translateY(-50%); }
  .engine-slot:nth-child(3) { bottom: -28px; left: 50%; transform: translateX(-50%); }
  .engine-slot:nth-child(4) { top: 50%; left: -28px; transform: translateY(-50%); }
  .engine-slot:nth-child(5) { top: 10%; right: 10%; }

  /* ── NEXUS (center) ──────────────────────── */
  .nexus {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .creature {
    width: 80px; height: 80px;
    background: rgba(60, 180, 170, 0.08);
    border: 1px solid rgba(60, 180, 170, 0.2);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.04); opacity: 1; }
  }

  .preset-name {
    font-size: 18px;
    font-weight: 600;
    color: rgba(60, 180, 170, 0.9);
    letter-spacing: 0.5px;
  }
  .preset-category {
    font-size: 11px;
    color: rgba(200, 204, 216, 0.4);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* ── MACRO STRIP ─────────────────────────── */
  .macro-strip {
    position: absolute;
    bottom: 316px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 24px;
    z-index: 4;
    transition: bottom 0.3s;
  }
  .macro {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .macro-knob {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid rgba(60, 180, 170, 0.3);
    background: rgba(60, 180, 170, 0.05);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .macro-knob:hover {
    border-color: rgba(60, 180, 170, 0.6);
    background: rgba(60, 180, 170, 0.1);
  }
  .macro-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(200, 204, 216, 0.5);
  }

  /* ── ENGINE PICKER (slide-out drawer) ────── */
  .picker-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
  }
  .picker-backdrop.open { display: block; }

  .engine-picker {
    position: fixed;
    top: 0; bottom: 0; left: 0;
    width: 320px;
    background: linear-gradient(to right, #1a1c24 0%, #16181e 100%);
    border-right: 1px solid rgba(60, 180, 170, 0.1);
    z-index: 101;
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    overflow: hidden;
  }
  .picker-backdrop.open .engine-picker { transform: translateX(0); }

  .picker-header {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(200, 204, 216, 0.06);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .picker-title {
    font-size: 14px;
    font-weight: 600;
    color: rgba(60, 180, 170, 0.9);
    letter-spacing: 0.5px;
    flex: 1;
  }
  .picker-close {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid rgba(200, 204, 216, 0.08);
    background: transparent;
    color: rgba(200, 204, 216, 0.4);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .picker-close:hover {
    background: rgba(200, 204, 216, 0.06);
    color: rgba(200, 204, 216, 0.8);
  }

  .picker-search {
    margin: 12px 20px;
    padding: 8px 12px;
    background: rgba(200, 204, 216, 0.04);
    border: 1px solid rgba(200, 204, 216, 0.08);
    border-radius: 8px;
    color: #c8ccd8;
    font-size: 12px;
    outline: none;
  }
  .picker-search::placeholder { color: rgba(200, 204, 216, 0.25); }
  .picker-search:focus { border-color: rgba(60, 180, 170, 0.3); }

  .picker-categories {
    display: flex;
    gap: 4px;
    padding: 0 20px 12px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .picker-cat {
    padding: 4px 10px;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(200, 204, 216, 0.35);
    background: transparent;
    border: 1px solid rgba(200, 204, 216, 0.06);
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .picker-cat:hover { color: rgba(200, 204, 216, 0.7); border-color: rgba(200, 204, 216, 0.15); }
  .picker-cat.active {
    color: rgba(60, 180, 170, 0.9);
    border-color: rgba(60, 180, 170, 0.3);
    background: rgba(60, 180, 170, 0.06);
  }

  .picker-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 12px;
  }

  .engine-tile {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: grab;
    transition: all 0.15s;
    margin-bottom: 2px;
  }
  .engine-tile:hover {
    background: rgba(60, 180, 170, 0.06);
  }
  .engine-tile:active {
    cursor: grabbing;
    background: rgba(60, 180, 170, 0.1);
  }

  .engine-tile-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .engine-tile-info { flex: 1; min-width: 0; }
  .engine-tile-name {
    font-size: 13px;
    font-weight: 600;
    color: rgba(200, 204, 216, 0.85);
  }
  .engine-tile-desc {
    font-size: 10px;
    color: rgba(200, 204, 216, 0.35);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .engine-tile-depth {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── PLAY SURFACE ────────────────────────── */
  .play-surface {
    height: 300px;
    background: linear-gradient(to bottom, rgba(22, 24, 30, 0.95), rgba(16, 18, 22, 0.98));
    border-top: 1px solid rgba(60, 180, 170, 0.1);
    display: flex;
    flex-direction: column;
    position: relative;
    flex-shrink: 0;
  }
  .drag-handle {
    width: 40px; height: 4px;
    background: rgba(200, 204, 216, 0.2);
    border-radius: 2px;
    margin: 8px auto;
    cursor: ns-resize;
  }
  .surface-tabs {
    display: flex;
    gap: 2px;
    padding: 0 16px;
    margin-bottom: 8px;
  }
  .surface-tab {
    padding: 6px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(200, 204, 216, 0.4);
    background: transparent;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .surface-tab:hover { color: rgba(200, 204, 216, 0.7); }
  .surface-tab.active {
    color: rgba(60, 180, 170, 0.9);
    background: rgba(60, 180, 170, 0.08);
  }
  .surface-tab-spacer { flex: 1; }

  /* MPE keys */
  .mpe-surface {
    flex: 1;
    display: flex;
    padding: 0 16px 16px;
    gap: 1px;
    overflow: hidden;
  }
  .mpe-key {
    flex: 1;
    position: relative;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s;
    min-width: 0;
  }
  .mpe-key.white {
    background: linear-gradient(to bottom, rgba(200,204,216,0.12) 0%, rgba(200,204,216,0.06) 100%);
    border: 1px solid rgba(200,204,216,0.08);
  }
  .mpe-key.white:hover {
    background: linear-gradient(to bottom, rgba(60,180,170,0.15) 0%, rgba(60,180,170,0.08) 100%);
    border-color: rgba(60,180,170,0.2);
  }
  .mpe-key.white:active {
    background: linear-gradient(to bottom, rgba(60,180,170,0.3) 0%, rgba(60,180,170,0.15) 100%);
    border-color: rgba(60,180,170,0.4);
  }
  .mpe-key.black {
    flex: 0.6;
    background: linear-gradient(to bottom, rgba(16,18,22,0.9) 0%, rgba(10,12,16,0.95) 100%);
    border: 1px solid rgba(200,204,216,0.05);
    margin: 0 -4px;
    z-index: 1;
    height: 55%;
  }
  .mpe-key.black:hover {
    background: linear-gradient(to bottom, rgba(140,100,220,0.2) 0%, rgba(140,100,220,0.1) 100%);
    border-color: rgba(140,100,220,0.3);
  }
  .mpe-key.black:active {
    background: linear-gradient(to bottom, rgba(140,100,220,0.4) 0%, rgba(140,100,220,0.2) 100%);
  }
  .mpe-key .pressure {
    position: absolute; bottom: 0; left: 0; right: 0; height: 0%;
    background: linear-gradient(to top, rgba(60,180,170,0.4) 0%, rgba(60,180,170,0) 100%);
    border-radius: 0 0 4px 4px;
    transition: height 0.05s;
    pointer-events: none;
  }
  .mpe-key:active .pressure { height: 60%; }
  .mpe-key .note-label {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: rgba(200,204,216,0.2); pointer-events: none;
  }
  .mpe-key:hover .note-label { color: rgba(200,204,216,0.5); }

  /* ── SPLIT VIEW: ocean left, surface right ─ */
  .ocean-split {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .ocean { transition: flex 0.3s ease; }

  .surface-right {
    width: 0;
    flex-shrink: 0;
    background: linear-gradient(to bottom, rgba(22, 26, 34, 0.97), rgba(16, 18, 22, 0.98));
    border-left: 1px solid rgba(60, 180, 170, 0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.3s ease;
  }
  .surface-right.open { width: 420px; }

  .surface-right-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(200, 204, 216, 0.06);
    flex-shrink: 0;
  }
  .surface-right-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(60, 180, 170, 0.7);
    flex: 1;
  }
  .surface-right-close {
    width: 24px; height: 24px;
    border-radius: 6px;
    border: 1px solid rgba(200, 204, 216, 0.08);
    background: transparent;
    color: rgba(200, 204, 216, 0.4);
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .surface-right-close:hover { background: rgba(200,204,216,0.06); color: rgba(200,204,216,0.8); }

  .surface-right-body {
    flex: 1;
    padding: 12px;
    min-height: 0;
  }

  .split-pad-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    height: 100%;
  }

  .split-drum-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    height: 100%;
  }

  .split-xy-wrap {
    display: flex;
    flex-direction: column;
    gap: 16px;
    height: 100%;
  }

  .pad-surface { display: none; }
  .drum-surface { display: none; }

  .pad-cell {
    border-radius: 12px;
    background: linear-gradient(145deg, rgba(200,204,216,0.06) 0%, rgba(200,204,216,0.02) 100%);
    border: 1px solid rgba(200,204,216,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.08s;
    position: relative;
    overflow: hidden;
    aspect-ratio: 1;
  }
  .pad-cell:hover {
    background: linear-gradient(to bottom, rgba(60,180,170,0.1) 0%, rgba(60,180,170,0.05) 100%);
    border-color: rgba(60,180,170,0.2);
  }
  .pad-cell:active {
    background: linear-gradient(to bottom, rgba(60,180,170,0.25) 0%, rgba(60,180,170,0.12) 100%);
    border-color: rgba(60,180,170,0.4);
    transform: scale(0.97);
  }
  .pad-cell .pad-note {
    font-size: 14px;
    font-weight: 600;
    color: rgba(200,204,216,0.5);
  }
  .pad-cell:active .pad-note { color: rgba(60,180,170,0.9); }
  .pad-cell .pad-vel {
    font-size: 8px;
    color: rgba(200,204,216,0.2);
    font-family: 'JetBrains Mono', monospace;
  }
  /* Velocity ripple on press */
  .pad-cell::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(60,180,170,0.3) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.08s;
    pointer-events: none;
  }
  .pad-cell:active::after { opacity: 1; }

  .drum-surface { display: none; }

  .drum-pad {
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(200,204,216,0.05) 0%, rgba(200,204,216,0.02) 100%);
    border: 1px solid rgba(200,204,216,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.08s;
    position: relative;
  }
  .drum-pad:hover {
    background: linear-gradient(135deg, rgba(140,100,220,0.08) 0%, rgba(60,180,170,0.06) 100%);
    border-color: rgba(140,100,220,0.2);
  }
  .drum-pad:active {
    background: linear-gradient(135deg, rgba(140,100,220,0.2) 0%, rgba(60,180,170,0.15) 100%);
    border-color: rgba(140,100,220,0.4);
    transform: scale(0.96);
  }
  .drum-pad .drum-icon { font-size: 24px; opacity: 0.7; }
  .drum-pad:active .drum-icon { opacity: 1; }
  .drum-pad .drum-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(200,204,216,0.35);
  }
  .drum-pad:active .drum-label { color: rgba(140,100,220,0.9); }

  .xy-surface { display: none; }

  .xy-pad {
    flex: 1;
    background: rgba(200,204,216,0.03);
    border: 1px solid rgba(200,204,216,0.06);
    border-radius: 12px;
    position: relative;
    cursor: crosshair;
    overflow: hidden;
  }
  .xy-pad::before {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px;
    background: rgba(200,204,216,0.04);
  }
  .xy-pad::after {
    content: '';
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 1px;
    background: rgba(200,204,216,0.04);
  }
  .xy-cursor {
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: rgba(60,180,170,0.5);
    border: 2px solid rgba(60,180,170,0.8);
    box-shadow: 0 0 16px rgba(60,180,170,0.3);
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: left 0.05s, top 0.05s;
    left: 50%; top: 50%;
  }
  .xy-label {
    position: absolute;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(200,204,216,0.2);
  }
  .xy-label.x-label { bottom: 8px; left: 50%; transform: translateX(-50%); }
  .xy-label.y-label { left: 8px; top: 50%; transform: translateY(-50%) rotate(-90deg); }

  .xy-info {
    width: 140px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-top: 8px;
  }
  .xy-readout {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .xy-readout label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(200,204,216,0.35);
  }
  .xy-readout .xy-val {
    font-size: 16px;
    font-weight: 600;
    color: rgba(60,180,170,0.8);
    font-family: 'JetBrains Mono', monospace;
  }
  .xy-assign {
    padding: 6px 12px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(200,204,216,0.4);
    background: transparent;
    border: 1px solid rgba(200,204,216,0.08);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .xy-assign:hover {
    color: rgba(200,204,216,0.7);
    border-color: rgba(200,204,216,0.15);
  }

  /* ── STATUS BAR ──────────────────────────── */
  .status-bar {
    height: 24px;
    background: rgba(10, 12, 16, 0.9);
    border-top: 1px solid rgba(200, 204, 216, 0.06);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 24px;
    font-size: 10px;
    color: rgba(200, 204, 216, 0.35);
    flex-shrink: 0;
  }
  .status-bar .spacer { flex: 1; }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(60,180,170,0.5); }

  /* ── FLOATING NAV ────────────────────────── */
  .nav-row {
    position: absolute;
    top: 12px; left: 16px; right: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 10;
  }
  .nav-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid rgba(200,204,216,0.08);
    background: rgba(200,204,216,0.04);
    color: rgba(200,204,216,0.5);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .nav-btn:hover {
    background: rgba(200,204,216,0.08);
    color: rgba(200,204,216,0.8);
  }
  .nav-btn.engines-btn {
    width: auto;

<script>
  // ── ENGINE DATA ──
  const engines = [
    { name: 'Obrix', desc: 'Flagship wavetable + FM hybrid', icon: '🌊', color: '#3CB4AA', depth: 'sunlit' },
    { name: 'Oxytocin', desc: 'Circuit love synthesizer', icon: '💗', color: '#E06090', depth: 'twilight' },
    { name: 'Opera', desc: 'Additive vocal Kuramoto', icon: '🎭', color: '#C8A040', depth: 'deep' },
    { name: 'Oware', desc: 'Akan tuned percussion', icon: '🥁', color: '#D4A574', depth: 'sunlit' },
    { name: 'Offering', desc: 'Boom bap drum engine', icon: '🎯', color: '#8B6914', depth: 'sunlit' },
    { name: 'Onset', desc: 'Transient percussion', icon: '⚡', color: '#E8A030', depth: 'sunlit' },
    { name: 'Ouroboros', desc: 'Self-feeding feedback', icon: '🐍', color: '#7C3AED', depth: 'midnight' },
    { name: 'Obscura', desc: 'Stiff string resonance', icon: '🔮', color: '#6B21A8', depth: 'deep' },
    { name: 'Orbital', desc: 'Phase-locked oscillators', icon: '🪐', color: '#3B82F6', depth: 'twilight' },
    { name: 'Organon', desc: 'Metabolic synthesis', icon: '🧬', color: '#10B981', depth: 'deep' },
    { name: 'Odyssey', desc: 'Classic analog drift', icon: '🚀', color: '#F59E0B', depth: 'sunlit' },
    { name: 'Overdub', desc: 'Tape saturation engine', icon: '📼', color: '#EF4444', depth: 'sunlit' },
    { name: 'Opal', desc: 'Granular crystalline', icon: '💎', color: '#A78BFA', depth: 'twilight' },
    { name: 'Oceanic', desc: 'Spectral ocean model', icon: '🌀', color: '#0EA5E9', depth: 'midnight' },
    { name: 'Oto', desc: 'Tonewheel organ', icon: '🎹', color: '#84CC16', depth: 'sunlit' },
    { name: 'Ogre', desc: 'Sub bass monster', icon: '👹', color: '#DC2626', depth: 'midnight' },
  ];

  const depthColors = { sunlit: '#3CB4AA', twilight: '#7C3AED', deep: '#1E40AF', midnight: '#1a1c24' };

  // ── POPULATE PICKER ──
  const pickerList = document.getElementById('pickerList');
  engines.forEach(eng => {
    const tile = document.createElement('div');
    tile.className = 'engine-tile';
    tile.draggable = true;
    tile.dataset.engine = eng.name;
    tile.innerHTML = `
      <div class="engine-tile-icon" style="background:${eng.color}20; border:1px solid ${eng.color}40">${eng.icon}</div>
      <div class="engine-tile-info">
        <div class="engine-tile-name">${eng.name}</div>
        <div class="engine-tile-desc">${eng.desc}</div>
      </div>
      <div class="engine-tile-depth" style="background:${depthColors[eng.depth]}"></div>
    `;
    // Drag start
    tile.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', eng.name);
      e.dataTransfer.effectAllowed = 'copy';
    });
    pickerList.appendChild(tile);
  });

  // ── PICKER OPEN/CLOSE ──
  const backdrop = document.getElementById('pickerBackdrop');
  document.getElementById('enginesBtn').addEventListener('click', () => backdrop.classList.add('open'));
  document.getElementById('pickerClose').addEventListener('click', () => backdrop.classList.remove('open'));
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) backdrop.classList.remove('open'); });

  // ── SEARCH ──
  document.getElementById('pickerSearch').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.engine-tile').forEach(t => {
      t.style.display = t.dataset.engine.toLowerCase().includes(q) ? '' : 'none';
    });
  });

  // ── CATEGORY FILTER ──
  document.querySelectorAll('.picker-cat').forEach(cat => {
    cat.addEventListener('click', () => {
      document.querySelectorAll('.picker-cat').forEach(c => c.classList.remove('active'));
      cat.classList.add('active');
    });
  });

  // ── DROP TARGETS (engine slots) ──
  document.querySelectorAll('.engine-slot').forEach(slot => {
    slot.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; slot.classList.add('drop-hover'); });
    slot.addEventListener('dragleave', () => slot.classList.remove('drop-hover'));
    slot.addEventListener('drop', (e) => {
      e.preventDefault();

  // Draw waveform visualization
  function drawWaveform(color) {
    const canvas = document.getElementById('waveformCanvas');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    const w = rect.width, h = rect.height;

    ctx.clearRect(0, 0, w, h);

    // Draw a wavetable-style waveform
    ctx.beginPath();
    ctx.strokeStyle = color || 'rgba(60, 180, 170, 0.8)';
    ctx.lineWidth = 1.5;
    const mid = h / 2;
    for (let x = 0; x < w; x++) {
      const t = x / w;
      const y = mid + Math.sin(t * Math.PI * 8) * (mid * 0.6) *
        (1 + 0.3 * Math.sin(t * Math.PI * 3)) *
        Math.exp(-t * 0.5);
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Glow
    ctx.strokeStyle = (color || 'rgba(60, 180, 170)') + '30';
    ctx.lineWidth = 4;
    ctx.beginPath();
    for (let x = 0; x < w; x++) {
      const t = x / w;
      const y = mid + Math.sin(t * Math.PI * 8) * (mid * 0.6) *
        (1 + 0.3 * Math.sin(t * Math.PI * 3)) *
        Math.exp(-t * 0.5);
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Center line
    ctx.strokeStyle = 'rgba(200, 204, 216, 0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, mid);
    ctx.lineTo(w, mid);
    ctx.stroke();
  }

  // Draw ADSR curve
  function drawADSR(color) {
    const canvas = document.getElementById('adsrCanvas');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    const w = rect.width, h = rect.height;
    const pad = 8;

    const sliders = document.querySelectorAll('.adsr-slider');
    const a = sliders[0].value / 100;
    const d = sliders[1].value / 100;
    const s = sliders[2].value / 100;
    const r = sliders[3].value / 100;

    ctx.clearRect(0, 0, w, h);

    // Grid lines
    ctx.strokeStyle = 'rgba(200, 204, 216, 0.04)';
    ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(0, (h / 4) * i);
      ctx.lineTo(w, (h / 4) * i);
      ctx.stroke();
    }

    const usableW = w - pad * 2;
    const usableH = h - pad * 2;
    const attackW = a * usableW * 0.3;
    const decayW = d * usableW * 0.25;
    const sustainW = usableW * 0.2;
    const releaseW = r * usableW * 0.25;

    const x0 = pad;
    const y0 = pad + usableH; // bottom
    const yTop = pad; // top
    const ySus = pad + usableH * (1 - s);

    // Fill
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x0 + attackW, yTop); // attack
    ctx.lineTo(x0 + attackW + decayW, ySus); // decay
    ctx.lineTo(x0 + attackW + decayW + sustainW, ySus); // sustain
    ctx.lineTo(x0 + attackW + decayW + sustainW + releaseW, y0); // release
    ctx.lineTo(x0, y0);
    ctx.fillStyle = (color || 'rgba(60, 180, 170)') + '15';
    ctx.fill();

    // Stroke
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x0 + attackW, yTop);
    ctx.lineTo(x0 + attackW + decayW, ySus);
    ctx.lineTo(x0 + attackW + decayW + sustainW, ySus);
    ctx.lineTo(x0 + attackW + decayW + sustainW + releaseW, y0);
    ctx.strokeStyle = color || 'rgba(60, 180, 170, 0.8)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Control points
    const points = [
      [x0, y0],
      [x0 + attackW, yTop],
      [x0 + attackW + decayW, ySus],
      [x0 + attackW + decayW + sustainW, ySus],
      [x0 + attackW + decayW + sustainW + releaseW, y0],
    ];
    points.forEach(([px, py]) => {
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fillStyle = color || 'rgba(60, 180, 170, 0.9)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(22, 24, 30, 0.8)';
      ctx.lineWidth = 2;
      ctx.stroke();
    });
  }

  let xyAutoRaf = null;

  const bpm = 120;

  function startXYAuto(shape) {
    stopXYAuto();
    xyAutoShape = shape;
    const stopBtn = document.getElementById('xyAutoStop');
    if (stopBtn) stopBtn.style.display = '';
    // Highlight active shape button
    document.querySelectorAll('.xy-auto-btn').forEach(b => {
      b.style.color = b.dataset.shape === shape ? 'rgba(60,180,170,0.9)' : '';
      b.style.borderColor = b.dataset.shape === shape ? 'rgba(60,180,170,0.3)' : '';

    const startTime = performance.now();
    function tick() {
      const cursor = document.getElementById('xyCursorSplit');
      const xvEl = document.getElementById('xyXValSplit');
      const yvEl = document.getElementById('xyYValSplit');
      if (!cursor) { stopXYAuto(); return; }

      const bpmDiv = parseFloat(document.getElementById('xyBpmDiv')?.value || '1');
      const cycleDuration = (60000 / bpm) * 4 * bpmDiv; // ms per cycle
      const t = ((performance.now() - startTime) % cycleDuration) / cycleDuration;
      const tau = t * Math.PI * 2;

      let x = 0.5, y = 0.5;
      if (shape === 'circle') {
        x = 0.5 + 0.35 * Math.cos(tau);
        y = 0.5 + 0.35 * Math.sin(tau);
      } else if (shape === 'figure8') {
        x = 0.5 + 0.35 * Math.sin(tau);
        y = 0.5 + 0.35 * Math.sin(tau * 2);
      } else if (shape === 'sweep') {
        x = t;
        y = 0.5 + 0.4 * Math.sin(tau * 3);
      } else if (shape === 'random') {
        // Smooth random via noise approximation
        x = 0.5 + 0.4 * Math.sin(tau * 1.3 + 1.7) * Math.cos(tau * 0.7);
        y = 0.5 + 0.4 * Math.cos(tau * 0.9 + 2.3) * Math.sin(tau * 1.1);
      }

      cursor.style.left = (x * 100) + '%';
      cursor.style.top = (y * 100) + '%';
      cursor.style.boxShadow = '0 0 20px rgba(60,180,170,0.4)';
      if (xvEl) xvEl.textContent = Math.round(x * 100) + '%';
      if (yvEl) yvEl.textContent = Math.round((1 - y) * 100) + '%';

      xyAutoRaf = requestAnimationFrame(tick);
    }
    xyAutoRaf = requestAnimationFrame(tick);
  }

  function stopXYAuto() {
    if (xyAutoRaf) cancelAnimationFrame(xyAutoRaf);
    xyAutoRaf = null;
    xyAutoShape = null;
    const stopBtn = document.getElementById('xyAutoStop');
    if (stopBtn) stopBtn.style.display = 'none';
    document.querySelectorAll('.xy-auto-btn').forEach(b => {
      b.style.color = '';
      b.style.borderColor = '';
    });
    const cursor = document.getElementById('xyCursorSplit');
    if (cursor) cursor.style.boxShadow = '0 0 16px rgba(60,180,170,0.3)';
  }

  // Wire automation buttons (delegated since they're dynamically created)
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.xy-auto-btn');
    if (btn) startXYAuto(btn.dataset.shape);
    if (e.target.id === 'xyAutoStop') stopXYAuto();
  });

  function closeSurfaceRight() {
    surfaceRight.classList.remove('open');
    currentSurfaceMode = null;
    // Reset tab highlight to KEYS
    document.querySelectorAll('.surface-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.surface-tab').classList.add('active'); // first tab = KEYS
  }

  document.getElementById('surfaceRightClose').addEventListener('click', closeSurfaceRight);

  // ── TAB SWITCHING ──
  document.querySelectorAll('.surface-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const mode = tab.textContent.trim();

      document.querySelectorAll('.surface-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');

      if (mode === 'KEYS') {
        closeSurfaceRight();
        document.getElementById('mpe').style.display = 'flex';
        tab.classList.add('active');
        return;
      }

      // DETAIL, FX, CPL — future
      if (mode === 'DETAIL' || mode === 'FX' || mode === 'CPL') return;

      // PAD, DRUM, XY — slide in right panel
      document.getElementById('mpe').style.display = 'flex'; // keep keys visible
      openSurfaceRight(mode);
    });
  });
</script>

</body>
</html>
