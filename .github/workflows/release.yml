name: Release XOceanus

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Full history needed so the version-bump commit can be pushed
          fetch-depth: 0

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: version '$VERSION' does not match semver x.y.z"
            exit 1
          fi
          echo "Version '$VERSION' is valid."

      - name: Update VERSION in CMakeLists.txt
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i '' "s/project(XOceanus VERSION [0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*)/project(XOceanus VERSION $VERSION)/" CMakeLists.txt
          # Verify the substitution took effect
          grep "project(XOceanus VERSION $VERSION" CMakeLists.txt || {
            echo "ERROR: CMakeLists.txt was not updated correctly"
            exit 1
          }

      - name: Commit version bump
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CMakeLists.txt
          git commit -m "Release v${VERSION}"

      - name: Create and push tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git tag "v${VERSION}"
          git push origin HEAD:main
          git push origin "v${VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          gh release create "v${VERSION}" \
            --title "XOceanus v${VERSION}" \
            --generate-notes
