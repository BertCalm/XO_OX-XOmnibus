name: Build XOceanus

on:
  push:
    branches: [main]
    paths:
      - 'Source/**'
      - 'Tests/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build.yml'
      - 'Libs/**'
  pull_request:
    branches: [main]
    paths:
      - 'Source/**'
      - 'Tests/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build.yml'
      - 'Libs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MACOSX_DEPLOYMENT_TARGET: '12.0'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v5
        with:
          path: Libs/JUCE
          key: juce-8.0.4

      - name: Cache build artifacts
        uses: actions/cache@v5
        with:
          path: |
            build/CMakeFiles
            build/CMakeCache.txt
          key: ${{ runner.os }}-${{ github.workflow }}-build-${{ hashFiles('Source/**', 'CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.workflow }}-build-

      - name: Install ccache
        run: brew install ccache

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/ccache
          key: ccache-${{ runner.os }}-${{ github.workflow }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.workflow }}-

      - name: Clone JUCE 8.0.4
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          mkdir -p Libs
          # Pin to the exact commit SHA for JUCE 8.0.4 to prevent supply chain attacks
          # via force-pushed tags. SHA verified 2026-03-30 against juce-framework/JUCE tag 8.0.4.
          git clone https://github.com/juce-framework/JUCE.git Libs/JUCE
          cd Libs/JUCE && git checkout 51d11a2be6d5c97ccf12b4e5e827006e19f0555a

      - name: Install Ninja
        run: brew install ninja

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        env:
          CC: /usr/bin/clang
          CXX: /usr/bin/clang++

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure --timeout 120 2>&1 | tee test_output.txt

      - name: Report test results
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f build/test_output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat build/test_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "_No test output file found — no tests were run or ctest did not produce output._" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Extract version and SHA
        id: meta
        run: |
          VERSION=$(grep -m1 'project(XOceanus VERSION' CMakeLists.txt | sed 's/.*VERSION \([0-9.]*\).*/\1/')
          SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Verify AU component
        run: |
          if [ ! -d "build/XOceanus_artefacts/Release/AU/XOceanus.component" ]; then
            echo "ERROR: AU component not found"
            exit 1
          fi
          echo "AU component found at build/XOceanus_artefacts/Release/AU/XOceanus.component"

      - name: Run auval validation
        continue-on-error: true
        run: |
          cp -R build/XOceanus_artefacts/Release/AU/XOceanus.component ~/Library/Audio/Plug-Ins/Components/
          echo "Running auval -v aumu Xocn XoOx"
          auval -v aumu Xocn XoOx
          echo "auval exit code: $?"

      - name: Verify Standalone app
        run: |
          if [ ! -d "build/XOceanus_artefacts/Release/Standalone/XOceanus.app" ]; then
            echo "ERROR: Standalone app not found"
            exit 1
          fi
          echo "Standalone app found at build/XOceanus_artefacts/Release/Standalone/XOceanus.app"

      - name: Upload AU component
        uses: actions/upload-artifact@v4
        with:
          name: XOceanus-AU-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.sha }}
          path: build/XOceanus_artefacts/Release/AU/XOceanus.component

      - name: Upload Standalone app
        uses: actions/upload-artifact@v4
        with:
          name: XOceanus-Standalone-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.sha }}
          path: build/XOceanus_artefacts/Release/Standalone/XOceanus.app
