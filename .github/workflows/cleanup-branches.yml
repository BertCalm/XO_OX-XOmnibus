name: Cleanup Stale Branches

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list branches without deleting)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday at 03:00 UTC

permissions:
  contents: write

jobs:
  delete-merged-branch:
    name: Delete branch after PR merge
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Delete head branch
        uses: actions/github-script@v8
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            if (branch === 'main') {
              console.log('Skipping protected branch: main');
              return;
            }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
              console.log(`Deleted branch: ${branch}`);
            } catch (err) {
              console.log(`Could not delete branch ${branch}: ${err.message}`);
            }

  cleanup-stale-branches:
    name: Clean up stale branches
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale branches
        uses: actions/github-script@v8
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        with:
          script: |
            const dryRun = process.env.DRY_RUN === 'true';
            // Branches that are never deleted regardless of age
            const protectedBranches = ['main', 'develop', 'staging', 'release'];
            const cutoffDays = 30;
            const cutoffDate = new Date(Date.now() - cutoffDays * 24 * 60 * 60 * 1000);

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            console.log(`Found ${branches.length} branches. Cutoff date: ${cutoffDate.toISOString()}`);

            for (const branch of branches) {
              if (protectedBranches.includes(branch.name)) {
                console.log(`Skipping protected branch: ${branch.name}`);
                continue;
              }

              const commit = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: branch.commit.sha,
              });

              const lastCommitDate = new Date(commit.data.commit.committer.date);
              const ageDays = Math.floor((Date.now() - lastCommitDate) / (24 * 60 * 60 * 1000));

              if (lastCommitDate < cutoffDate) {
                if (dryRun) {
                  console.log(`[DRY RUN] Would delete branch: ${branch.name} (last commit: ${lastCommitDate.toISOString()}, ${ageDays} days ago)`);
                } else {
                  try {
                    await github.rest.git.deleteRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: `heads/${branch.name}`,
                    });
                    console.log(`Deleted branch: ${branch.name} (last commit: ${lastCommitDate.toISOString()}, ${ageDays} days ago)`);
                  } catch (err) {
                    console.log(`Could not delete branch ${branch.name}: ${err.message}`);
                  }
                }
              } else {
                console.log(`Keeping branch: ${branch.name} (last commit: ${lastCommitDate.toISOString()}, ${ageDays} days ago)`);
              }
            }
