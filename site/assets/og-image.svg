<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- XOlokun social share og:image placeholder (1200x630) -->
  <!-- Replace with final artwork before launch -->
  <rect width="1200" height="630" fill="#1A1A2E"/>
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1A1A3E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E9C46A"/>
      <stop offset="100%" stop-color="#C9A84A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#E9C46A" stroke-width="0.5" opacity="0.15"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#E9C46A" stroke-width="0.5" opacity="0.15"/>
  <!-- XO Gold accent bar -->
  <rect x="0" y="580" width="1200" height="4" fill="url(#gold)" opacity="0.8"/>
  <!-- Main logotype -->
  <text x="600" y="260" font-family="'Space Grotesk', system-ui, sans-serif" font-size="96" font-weight="700"
        fill="#E9C46A" text-anchor="middle" letter-spacing="-2">XOlokun</text>
  <!-- Tagline -->
  <text x="600" y="330" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="300"
        fill="#F0EDE8" text-anchor="middle" opacity="0.85">for all</text>
  <!-- Descriptor line -->
  <text x="600" y="400" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="400"
        fill="#A0A8B8" text-anchor="middle">76 engines · Couple anything · Free &amp; open-source</text>
  <!-- XO_OX brand -->
  <text x="600" y="545" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="400"
        fill="#E9C46A" text-anchor="middle" opacity="0.6">XO_OX Designs · xo-ox.org</text>
</svg>
